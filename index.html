<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">
  <title>o mais brabo da familia</title>

  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/188/188987.png">

  <style>

    /* 🌆 FUNDO CIDADE NEON */
    body{
      margin:0;
      height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;

      text-align:center;
      color:white;
      font-family:Arial;

      background-image:
        linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.8)),
        url("https://images.unsplash.com/photo-1496307653780-42ee777d4833");

      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
    }

    /* ✨ TÍTULO */
    h1{
      font-size:65px;
      text-shadow:
        0 0 10px #00f2ff,
        0 0 20px #ff00ff,
        0 0 40px #00f2ff;
    }

    /* 📦 TEXTO */
    .mensagem{
      width:700px;
      font-size:28px;
      line-height:1.5;
      background:rgba(0,0,0,0.6);
      padding:20px;
      border-radius:20px;
      box-shadow:0 0 20px #00f2ff;
    }

    /* 🔘 BOTÃO NEON */
    button{
      margin-top:20px;
      padding:15px 30px;
      font-size:18px;

      border:none;
      border-radius:12px;
      cursor:pointer;

      color:white;
      background:#111;

      box-shadow:
        0 0 10px #00f2ff,
        0 0 20px #ff00ff;

      transition:0.3s;
    }

    button:hover{
      transform:scale(1.1);
      box-shadow:
        0 0 20px #00f2ff,
        0 0 40px #ff00ff;
    }

  </style>

</head>

<body>

  <h1>Meu primeiro site 😎</h1>

  <p class="mensagem">
    eu criei esse site 10:28 da manhã adriana,
    salve pepaaaaaa piiiiiggg 🐷
    <br><br>
    o mais brabo dos brabos da familia,
    vai tomando filhão 😎
  </p>

  <!-- 🎵 ÁUDIO -->
  <audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
  </audio>

  <button onclick="tocarMusica()">Tocar música 🎵</button>

  <script>
    function tocarMusica(){
      const audio = document.getElementById("musica");

      audio.volume = 0.2; // 🔊 baixo
      audio.load();

      audio.play().catch(() => {
        alert("❌ Não encontrou musica.mp3 ou o navegador bloqueou o áudio");
      });
    }
  </script>

</body>

</html>
