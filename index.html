<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">
  <title>o mais brabo da familia</title>

  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/188/188987.png">

  <style>

    body{
      margin:0;
      height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;

      text-align:center;
      color:white;
      font-family:Arial;

      overflow:hidden;

      background-image:
        linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)),
        url("https://images.unsplash.com/photo-1496307653780-42ee777d4833");

      background-size:cover;
      background-position:center;
    }

    h1{
      font-size:65px;
      text-shadow:0 0 15px #00f2ff;
    }

    .mensagem{
      width:700px;
      font-size:28px;
      background:rgba(0,0,0,0.6);
      padding:20px;
      border-radius:20px;
      box-shadow:0 0 20px #00f2ff;
    }

    button{
      margin-top:20px;
      padding:15px 30px;
      font-size:18px;
      border:none;
      border-radius:12px;
      background:#111;
      color:white;
      cursor:pointer;
      box-shadow:0 0 15px #00f2ff;
    }

    /* 🌧️ chuva */
    .rain {
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      pointer-events:none;
    }

    .drop {
      position:absolute;
      width:2px;
      height:80px;
      background:linear-gradient(transparent, #00f2ff);
      animation: fall linear infinite;
      opacity:0.6;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh);
      }
    }

    /* ⚡ FLASH DO RELÂMPAGO */
    .flash {
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:white;
      opacity:0;
      pointer-events:none;
    }

    .flash.active {
      animation: flashAnim 0.2s ease;
    }

    @keyframes flashAnim {
      0% {opacity:0;}
      20% {opacity:0.8;}
      100% {opacity:0;}
    }

  </style>

</head>

<body>

  <h1>Meu primeiro site 😎</h1>

  <p class="mensagem">
    salve pepaaaaaa piiiiiggg 🐷
    <br><br>
    agora com chuva e raio ⚡
  </p>

  <!-- 🎵 música -->
  <audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
  </audio>

  <button onclick="tocarMusica()">Tocar música 🎵</button>

  <!-- 🌧️ chuva -->
  <div class="rain" id="rain"></div>

  <!-- ⚡ flash -->
  <div class="flash" id="flash"></div>

  <script>

    // 🌧️ chuva
    const rain = document.getElementById("rain");

    for(let i = 0; i < 80; i++){
      let drop = document.createElement("div");
      drop.classList.add("drop");

      drop.style.left = Math.random() * 100 + "vw";
      drop.style.animationDuration = (Math.random() * 1 + 0.5) + "s";
      drop.style.opacity = Math.random();

      rain.appendChild(drop);
    }

    // 🎵 música
    const audio = document.getElementById("musica");
    audio.volume = 0.2;

    function tocarMusica(){
      audio.play().catch(() => {});
    }

    // ⚡ RELÂMPAGO ALEATÓRIO
    const flash = document.getElementById("flash");

    function relampago(){
      flash.classList.add("active");

      setTimeout(() => {
        flash.classList.remove("active");
      }, 200);
    }

    // dispara raio aleatoriamente
    setInterval(() => {
      if(Math.random() < 0.15){
        relampago();
      }
    }, 800);

  </script>

</body>

</html>

</html>
